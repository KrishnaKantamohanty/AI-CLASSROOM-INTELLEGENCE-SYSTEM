<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check In — AI Classroom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a1a;
            --surface: #12122a;
            --surface-2: #1a1a3e;
            --border: rgba(99, 102, 241, 0.2);
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.3);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.25);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.25);
            --warning: #f59e0b;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f1f5f9;
                --surface: #ffffff;
                --surface-2: #f8fafc;
                --border: rgba(99, 102, 241, 0.15);
                --text: #1e293b;
                --text-muted: #64748b;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            overflow: hidden;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, var(--primary-glow) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
            animation: bgShift 12s ease-in-out infinite alternate;
            z-index: -1;
        }

        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-5%, 3%) rotate(3deg); }
        }

        .checkin-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border-radius: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            margin-bottom: 0.75rem;
            box-shadow: 0 8px 24px var(--primary-glow);
        }

        .brand h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .brand p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.25rem;
            font-size: 1.1rem;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            background: var(--surface-2);
            border: 2px solid var(--border);
            border-radius: 0.875rem;
            color: var(--text);
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
        }

        .form-input::placeholder {
            text-transform: none;
            font-weight: 400;
            letter-spacing: 0;
            color: var(--text-muted);
            opacity: 0.6;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .btn-checkin {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            border: none;
            border-radius: 0.875rem;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-checkin:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--primary-glow);
        }

        .btn-checkin:active {
            transform: translateY(0);
        }

        .btn-checkin:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-checkin .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        .btn-checkin.loading .btn-text { display: none; }
        .btn-checkin.loading .spinner { display: inline-block; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Result States */
        .result {
            display: none;
            text-align: center;
            padding: 1rem 0;
        }

        .result.show { display: block; }

        .result-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-icon.success {
            background: var(--success-glow);
            color: var(--success);
            box-shadow: 0 8px 32px var(--success-glow);
        }

        .result-icon.error {
            background: var(--danger-glow);
            color: var(--danger);
            box-shadow: 0 8px 32px var(--danger-glow);
        }

        .result-icon.warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
            box-shadow: 0 8px 32px rgba(245, 158, 11, 0.15);
        }

        .result h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.375rem;
        }

        .result p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .result .student-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            margin-top: 0.75rem;
        }

        .btn-retry {
            margin-top: 1.5rem;
            padding: 0.75rem 2rem;
            font-size: 0.875rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border: 2px solid var(--border);
            border-radius: 0.75rem;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-retry:hover {
            background: var(--surface-2);
            border-color: var(--primary);
        }

        .session-info {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Confetti-like success particles */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="checkin-card" id="checkinCard">
        <!-- Form State -->
        <div id="formState">
            <div class="brand">
                <div class="brand-icon">
                    <i class="bi bi-mortarboard-fill"></i>
                </div>
                <h1>AI Classroom</h1>
                <p>Scan successful — mark your attendance</p>
            </div>

            <form id="checkinForm" onsubmit="submitCheckin(event)">
                <div class="form-group">
                    <label class="form-label">Your Roll Number</label>
                    <input type="text"
                           class="form-input"
                           id="rollInput"
                           name="roll_number"
                           placeholder="e.g. CS2024001"
                           autocomplete="off"
                           autocapitalize="characters"
                           required
                           autofocus>
                </div>

                <button type="submit" class="btn-checkin" id="submitBtn">
                    <span class="btn-text"><i class="bi bi-check-circle me-1"></i> Check In</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div class="session-info">
                <i class="bi bi-shield-lock me-1"></i>
                Secured session · {{ session.description or 'Attendance Check' }}
            </div>
        </div>

        <!-- Success State -->
        <div class="result" id="successState">
            <div class="result-icon success">
                <i class="bi bi-check-lg"></i>
            </div>
            <h2>Attendance Marked!</h2>
            <p id="successMsg">You're all set.</p>
            <div class="student-name" id="successName"></div>
            <button class="btn-retry" onclick="resetForm()">Check in Another Student</button>
        </div>

        <!-- Already State -->
        <div class="result" id="alreadyState">
            <div class="result-icon warning">
                <i class="bi bi-exclamation-lg"></i>
            </div>
            <h2>Already Checked In</h2>
            <p id="alreadyMsg">You've already been marked present today.</p>
            <div class="student-name" id="alreadyName"></div>
            <button class="btn-retry" onclick="resetForm()">Try Another Roll Number</button>
        </div>

        <!-- Error State -->
        <div class="result" id="errorState">
            <div class="result-icon error">
                <i class="bi bi-x-lg"></i>
            </div>
            <h2>Check-in Failed</h2>
            <p id="errorMsg">Something went wrong.</p>
            <button class="btn-retry" onclick="resetForm()">Try Again</button>
        </div>
    </div>

    <canvas class="particles" id="particles"></canvas>

    <script>
        const TOKEN = "{{ session.token }}";
        const SUBMIT_URL = `/checkin/${TOKEN}/submit`;

        async function submitCheckin(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const input = document.getElementById('rollInput');
            const roll = input.value.trim();

            if (!roll) return;

            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('roll_number', roll);

                const res = await fetch(SUBMIT_URL, {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();

                if (data.success && !data.already) {
                    showState('successState');
                    document.getElementById('successMsg').textContent = data.message;
                    document.getElementById('successName').textContent = data.student_name;
                    launchParticles();
                } else if (data.success && data.already) {
                    showState('alreadyState');
                    document.getElementById('alreadyMsg').textContent = data.message;
                    document.getElementById('alreadyName').textContent = data.student_name;
                } else {
                    showState('errorState');
                    document.getElementById('errorMsg').textContent = data.message;
                }
            } catch (err) {
                showState('errorState');
                document.getElementById('errorMsg').textContent = 'Network error. Please check your connection.';
            }

            btn.classList.remove('loading');
            btn.disabled = false;
        }

        function showState(stateId) {
            document.getElementById('formState').style.display = 'none';
            document.getElementById('successState').classList.remove('show');
            document.getElementById('alreadyState').classList.remove('show');
            document.getElementById('errorState').classList.remove('show');
            document.getElementById(stateId).classList.add('show');
        }

        function resetForm() {
            document.getElementById('formState').style.display = 'block';
            document.getElementById('successState').classList.remove('show');
            document.getElementById('alreadyState').classList.remove('show');
            document.getElementById('errorState').classList.remove('show');
            document.getElementById('rollInput').value = '';
            document.getElementById('rollInput').focus();
        }

        /* Celebration particles on success */
        function launchParticles() {
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const colors = ['#6366f1', '#8b5cf6', '#10b981', '#f59e0b', '#ec4899', '#06b6d4'];
            const particles = [];

            for (let i = 0; i < 60; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12 - 4,
                    size: Math.random() * 6 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    alpha: 1,
                    decay: Math.random() * 0.015 + 0.008
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let alive = false;

                for (const p of particles) {
                    if (p.alpha <= 0) continue;
                    alive = true;
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.15;
                    p.alpha -= p.decay;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = Math.max(0, p.alpha);
                    ctx.fill();
                }

                ctx.globalAlpha = 1;
                if (alive) requestAnimationFrame(animate);
                else ctx.clearRect(0, 0, canvas.width, canvas.height);
            }

            animate();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Expired — AI Classroom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a1a;
            --surface: #12122a;
            --border: rgba(239, 68, 68, 0.2);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.25);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f1f5f9;
                --surface: #ffffff;
                --border: rgba(239, 68, 68, 0.15);
                --text: #1e293b;
                --text-muted: #64748b;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 3rem 2rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .icon {
            width: 80px; height: 80px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: var(--danger-glow);
            color: var(--danger);
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 32px var(--danger-glow);
        }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.6; }
        .hint {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <i class="bi bi-clock-history"></i>
        </div>
        <h1>Session Expired</h1>
        <p>This QR code is no longer active. Please ask your teacher to generate a new attendance session.</p>
        <div class="hint">
            <i class="bi bi-info-circle me-1"></i>
            QR codes expire after a few minutes for security.
        </div>
    </div>
</body>
</html>
